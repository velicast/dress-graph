[build-system]
requires = ["setuptools>=45", "pybind11>=2.6"]
build-backend = "setuptools.build_meta"

[project]
name = "dress-graph"
version = "0.3.1"
description = "DRESS is a deterministic, parameter-free framework that iteratively refines the structural similarity of edges in a graph to produce a canonical fingerprint: a real-valued edge vector, obtained by converging a non-linear dynamical system to its unique fixed point. The fingerprint is isomorphism-invariant by construction, numerically stable, fast and embarrassingly parallel to compute: each iteration costs O(m * d_max) and convergence is guaranteed by Birkhoff contraction. As a direct consequence of these properties, DRESS is provably at least as expressive as the 2-dimensional Weisfeiler-Leman (2-WL) test, at a fraction of the cost (O(m * d_max) vs. O(n^3) per iteration)."
authors = [{name = "Eduar Castrillo Velilla"}]
maintainers = [{name = "Eduar Castrillo Velilla"}]
requires-python = ">=3.7"
license = "MIT"
license-files = ["LICENSE"]
readme = "README.md"
keywords = ["graph", "similarity", "community-detection", "isomorphism", "link-prediction", "network-analysis"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Mathematics",
    "Topic :: Scientific/Engineering :: Information Analysis",
]

[project.urls]
Homepage = "https://github.com/velicast/dress-graph"
Documentation = "https://velicast.github.io/dress-graph/"
Repository = "https://github.com/velicast/dress-graph"

[project.optional-dependencies]
native = ["pybind11>=2.6", "numpy"]
networkx = ["networkx"]

[tool.setuptools.packages.find]
where = ["src"]
