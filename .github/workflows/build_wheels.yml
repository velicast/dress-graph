name: Build and publish wheels

on:
  release:
    types: [published]
  workflow_dispatch:       # manual trigger for testing

permissions:
  contents: read

jobs:
  # ── Build wheels for Linux / macOS / Windows ───────────────────────
  build_wheels:
    name: Wheels · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Vendor C/C++ sources into python package
        shell: bash
        run: |
          VENDOR="python/src/dress/_vendored"
          mkdir -p "$VENDOR/include/dress" "$VENDOR/src"

          # C headers
          cp libdress/include/dress/dress.h         "$VENDOR/include/dress/"
          cp libdress/include/dress/delta_dress.h   "$VENDOR/include/dress/"

          # C++ header-only wrapper
          cp libdress++/include/dress/dress.hpp     "$VENDOR/include/dress/"

          # C sources
          cp libdress/src/dress.c                   "$VENDOR/src/"
          cp libdress/src/delta_dress.c             "$VENDOR/src/"
          cp libdress/src/delta_dress_impl.c        "$VENDOR/src/"
          cp libdress/src/delta_dress_impl.h        "$VENDOR/src/"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # macOS: install libomp for OpenMP support
      - name: Install libomp (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp

      # Pre-cache virtualenv .pyz to avoid 429 rate limits from GitHub blob URLs
      - name: Resolve cibuildwheel cache dir
        id: cbw-cache
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "dir=$LOCALAPPDATA/pypa/cibuildwheel/Cache" >> "$GITHUB_OUTPUT"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            echo "dir=$HOME/Library/Caches/cibuildwheel" >> "$GITHUB_OUTPUT"
          else
            echo "dir=$HOME/.cache/cibuildwheel" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/cache@v4
        with:
          path: ${{ steps.cbw-cache.outputs.dir }}
          key: cibuildwheel-virtualenv-20.27.1

      - name: Pre-download virtualenv
        shell: bash
        run: |
          VER="20.27.1"
          CACHE_DIR="${{ steps.cbw-cache.outputs.dir }}"
          mkdir -p "$CACHE_DIR"
          DEST="$CACHE_DIR/virtualenv-${VER}.pyz"
          if [ -f "$DEST" ] && python3 -c "
          import zipfile, sys
          try: zipfile.ZipFile(sys.argv[1]).testzip(); print('valid')
          except: sys.exit(1)
          " "$DEST" 2>/dev/null; then
            echo "✓ cached virtualenv ${VER} found"
          else
            rm -f "$DEST"
            # Use raw URL (less rate-limited than blob?raw=true)
            URL="https://raw.githubusercontent.com/pypa/get-virtualenv/${VER}/public/virtualenv.pyz"
            for i in 1 2 3 4 5; do
              echo "Attempt $i: downloading virtualenv ${VER}..."
              if curl -fsSL --retry 3 --retry-delay 10 -o "$DEST" "$URL"; then
                echo "  ✓ downloaded"
                break
              fi
              echo "  failed, waiting 30s..."
              sleep 30
            done
          fi

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        with:
          package-dir: python
        env:
          # Build CPython 3.9–3.13 on 64-bit platforms
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"

          CIBW_BUILD_VERBOSITY: 1

          # Fail hard if C extension doesn't compile (no silent pure-Python fallback)
          CIBW_ENVIRONMENT: DRESS_REQUIRE_NATIVE=1

          # Ensure pybind11 is available at build time
          CIBW_BEFORE_BUILD: pip install pybind11

          # Linux: install OpenMP dev headers inside the manylinux container
          CIBW_BEFORE_BUILD_LINUX: "yum install -y libgomp-devel || apt-get install -y libgomp1 || true && pip install pybind11"

          # macOS: build without OpenMP to avoid libomp deployment target mismatch.
          # Homebrew libomp targets macOS 15.0+ but wheels need to support 11.0+.
          # Users who need OpenMP can build from source with `brew install libomp`.
          CIBW_ENVIRONMENT_MACOS: >-
            DRESS_REQUIRE_NATIVE=1
            DRESS_NO_OPENMP=1

          # macOS: no repair command needed (no external dylibs to bundle)
          CIBW_REPAIR_COMMAND_MACOS: >-
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}

          # Test: quick import check
          CIBW_TEST_COMMAND: python -c "import dress; assert dress._BACKEND == 'c', f'expected c, got {dress._BACKEND}'"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ── Build source distribution ──────────────────────────────────────
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vendor C/C++ sources into python package
        run: |
          VENDOR="python/src/dress/_vendored"
          mkdir -p "$VENDOR/include/dress" "$VENDOR/src"
          cp libdress/include/dress/dress.h         "$VENDOR/include/dress/"
          cp libdress/include/dress/delta_dress.h   "$VENDOR/include/dress/"
          cp libdress++/include/dress/dress.hpp     "$VENDOR/include/dress/"
          cp libdress/src/dress.c                   "$VENDOR/src/"
          cp libdress/src/delta_dress.c             "$VENDOR/src/"
          cp libdress/src/delta_dress_impl.c        "$VENDOR/src/"
          cp libdress/src/delta_dress_impl.h        "$VENDOR/src/"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install build
          cd python && python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  # ── Upload to PyPI ─────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write          # for trusted publishing (no API token needed)

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
