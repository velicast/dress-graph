name: Build and publish wheels

on:
  release:
    types: [published]
  workflow_dispatch:       # manual trigger for testing

permissions:
  contents: read

jobs:
  # ── Build wheels for Linux / macOS / Windows ───────────────────────
  build_wheels:
    name: Wheels · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Vendor C/C++ sources into python package
        shell: bash
        run: |
          VENDOR="python/src/dress/_vendored"
          mkdir -p "$VENDOR/include/dress" "$VENDOR/src"

          # C headers
          cp libdress/include/dress/dress.h         "$VENDOR/include/dress/"
          cp libdress/include/dress/delta_dress.h   "$VENDOR/include/dress/"

          # C++ header-only wrapper
          cp libdress++/include/dress/dress.hpp     "$VENDOR/include/dress/"

          # C sources
          cp libdress/src/dress.c                   "$VENDOR/src/"
          cp libdress/src/delta_dress.c             "$VENDOR/src/"
          cp libdress/src/delta_dress_impl.c        "$VENDOR/src/"
          cp libdress/src/delta_dress_impl.h        "$VENDOR/src/"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # macOS: install libomp for OpenMP support
      - name: Install libomp (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        with:
          package-dir: python
        env:
          # Build CPython 3.9–3.13 on 64-bit platforms
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"

          CIBW_BUILD_VERBOSITY: 1

          # Linux: install OpenMP dev headers inside the manylinux container
          CIBW_BEFORE_BUILD_LINUX: yum install -y libgomp-devel || apt-get install -y libgomp1 || true

          # macOS: point compiler to Homebrew's libomp
          CIBW_ENVIRONMENT_MACOS: >-
            CFLAGS="-I$(brew --prefix libomp)/include"
            LDFLAGS="-L$(brew --prefix libomp)/lib"
            CXXFLAGS="-I$(brew --prefix libomp)/include"

          # Test: quick import check
          CIBW_TEST_COMMAND: python -c "import dress; assert dress._BACKEND == 'c', f'expected c, got {dress._BACKEND}'"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ── Build source distribution ──────────────────────────────────────
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vendor C/C++ sources into python package
        run: |
          VENDOR="python/src/dress/_vendored"
          mkdir -p "$VENDOR/include/dress" "$VENDOR/src"
          cp libdress/include/dress/dress.h         "$VENDOR/include/dress/"
          cp libdress/include/dress/delta_dress.h   "$VENDOR/include/dress/"
          cp libdress++/include/dress/dress.hpp     "$VENDOR/include/dress/"
          cp libdress/src/dress.c                   "$VENDOR/src/"
          cp libdress/src/delta_dress.c             "$VENDOR/src/"
          cp libdress/src/delta_dress_impl.c        "$VENDOR/src/"
          cp libdress/src/delta_dress_impl.h        "$VENDOR/src/"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          pip install build
          cd python && python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  # ── Upload to PyPI ─────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      id-token: write          # for trusted publishing (no API token needed)

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
